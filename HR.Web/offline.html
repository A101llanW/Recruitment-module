<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | NanoHireHub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f5f8;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            max-width: 480px;
            width: 100%;
            padding: 28px;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.4rem;
        }

        p {
            margin: 0 0 12px;
            line-height: 1.45;
            color: #475569;
        }

        .btn {
            margin-top: 14px;
            background: #0d6efd;
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 600;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>You are offline</h1>
        <p>The app cannot reach the server right now. Cached pages and static files remain available.</p>
        <p>Actions that need live data (login, save, submit, report generation) will work again once connection returns.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
        <div class="hint">Tip: reconnect to your network, then refresh this page.</div>
    </main>
</body>
</html>
